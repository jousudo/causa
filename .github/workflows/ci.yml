name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: no job here needs write access to anything.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Third-party actions are pinned by full commit SHA (tag in the comment) so a
# moved tag can never inject unreviewed code into this pipeline.
jobs:
  go:
    name: go build/vet/test (-race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: gofmt gate
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt required on:"; echo "$out"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test -race
        run: go test -race ./...

  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      # @latest on purpose: pinned staticcheck releases lag new Go toolchains,
      # which turns a Go upgrade into a spurious CI failure.
      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: staticcheck
        run: staticcheck ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...
